<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dubai Real Estate AI Lead Agent</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 850px;
      background: #111827;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }

    .header {
      padding: 22px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .header p {
      margin: 0;
      color: #94a3b8;
    }

    .reset-button {
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 10px;
      background: transparent;
      color: #e5e7eb;
      cursor: pointer;
      white-space: nowrap;
    }

    .reset-button:hover {
      background: #1f2937;
    }

    .chat-box {
      height: 480px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .assistant {
      align-self: flex-start;
      background: #1f2937;
    }

    .user {
      align-self: flex-end;
      background: #2563eb;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: #020617;
      border-top: 1px solid #1f2937;
    }

    input {
      flex: 1;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 15px;
    }

    button {
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #475569;
    }

    .demo-note {
      padding: 0 16px 16px;
      background: #020617;
      color: #64748b;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .input-area {
        flex-direction: column;
      }

      .message {
        max-width: 92%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Dubai Real Estate AI Lead Agent</h1>
        <p>Qualifies property leads before a human agent calls them.</p>
      </div>

      <button class="reset-button" onclick="resetChat()">Reset Chat</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
      <input id="userInput" type="text" placeholder="Type your answer..." />
      <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>

    <div class="demo-note">
      Demo for real estate agencies in Dubai / Middle East. No data is stored.
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendButton = document.getElementById("sendButton");

    const firstMessage = {
      role: "assistant",
      content: "Hello. Are you looking to buy or rent a property?"
    };

    let messages = [firstMessage];

    function renderMessages() {
      chatBox.innerHTML = "";

      messages.forEach((message) => {
        const div = document.createElement("div");
        div.className = "message " + message.role;
        div.textContent = message.content;
        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function resetChat() {
      messages = [firstMessage];
      userInput.value = "";
      renderMessages();
    }

    async function sendMessage() {
      const text = userInput.value.trim();

      if (!text) return;

      messages.push({
        role: "user",
        content: text
      });

      userInput.value = "";
      renderMessages();

      sendButton.disabled = true;
      sendButton.textContent = "Thinking...";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ messages: messages })
        });

        const data = await response.json();

        messages.push({
          role: "assistant",
          content: data.reply || "Something went wrong."
        });

      } catch (error) {
        messages.push({
          role: "assistant",
          content: "Network error. Please check your server."
        });
      }

      sendButton.disabled = false;
      sendButton.textContent = "Send";
      renderMessages();
    }

    userInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    renderMessages();
  </script>
</body>
</html>
